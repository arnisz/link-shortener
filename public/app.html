<!doctype html>
<html lang="de">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title data-i18n="app.page.title">aadd.li – Link-Kürzer</title>
	<link rel="stylesheet" href="/style.css" />
	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="icon" href="/icons/icon-192.png" type="image/png">
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#2563eb">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="aadd.li">
	<style>
		/* ── Page shell ── */
		body {
			margin: 0;
			padding: 2rem 1rem 4rem;
			box-sizing: border-box;
			min-height: 100vh;
			/* background comes from style.css: #f4f6fb */
		}

		.app-page {
			max-width: 640px;
			margin: 0 auto;
			display: flex;
			flex-direction: column;
			gap: 1.25rem;
		}

		/* ── Shared card surface ── */
		.app-card {
			background: #fff;
			border-radius: 14px;
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
			overflow: hidden;
		}

		/* ── App header ── */
		.app-header {
			padding: 1.25rem 1.5rem 1rem;
		}

		.app-brand-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
		}

		.brand {
			font-size: 1.5rem;
			font-weight: 800;
			letter-spacing: -0.04em;
			color: #2563eb;
			line-height: 1;
		}

		#status {
			margin: 0.4rem 0 0;
			font-size: 0.875rem;
			color: #6b7280;
			min-height: 1.25rem;
		}

		/* when JS injects the "not logged in" button into #status */
		#status button {
			font-size: 0.875rem;
			padding: 0.4rem 0.9rem;
		}

		.divider {
			border: none;
			border-top: 1px solid #e5e7eb;
			margin: 1rem 0 0;
		}

		/* ── Ghost / outline buttons ── */
		.btn-ghost {
			padding: 0.35rem 0.85rem;
			font-size: 0.8rem;
			font-weight: 500;
			background: #fff;
			color: #374151;
			border: 1px solid #d1d5db;
			border-radius: 999px;
			cursor: pointer;
			transition: border-color 0.15s, box-shadow 0.15s;
			font-family: inherit;
			white-space: nowrap;
		}

		.btn-ghost:hover {
			border-color: #9ca3af;
			box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
		}

		/* logout form sits inline so it doesn't push layout */
		#logout-form {
			margin: 0;
			padding: 0;
		}

		/* ── "Neuen Link kürzen" section ── */
		.section-create {
			padding: 1.5rem;
			border-bottom: 1px solid #f3f4f6;
		}

		.section-heading {
			font-size: 1rem;
			font-weight: 600;
			color: #111827;
			margin: 0 0 1rem;
		}

		/* Form fields */
		.field {
			margin-bottom: 0.75rem;
		}

		.field label {
			display: block;
			font-size: 0.8rem;
			font-weight: 600;
			color: #374151;
			margin-bottom: 0.3rem;
		}

		.field input[type="url"],
		.field input[type="text"],
		.field input[type="datetime-local"] {
			width: 100%;
			box-sizing: border-box;
			padding: 0.65rem 0.9rem;
			font-size: 0.95rem;
			border: 1px solid #e5e7eb;
			border-radius: 8px;
			color: #111827;
			background: #fff;
			font-family: inherit;
			transition: border-color 0.15s, box-shadow 0.15s;
			outline: none;
		}

		.field input:focus {
			border-color: #93c5fd;
			box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.25);
		}

		.field-row {
			display: flex;
			gap: 0.75rem;
		}

		.field-row .field {
			flex: 1;
		}

		/* Create button */
		.btn-primary {
			display: block;
			width: 100%;
			padding: 0.75rem 1.25rem;
			font-size: 0.95rem;
			font-weight: 600;
			background: #2563eb;
			color: #fff;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
			font-family: inherit;
			margin-top: 0.25rem;
		}

		.btn-primary:hover {
			background: #1d4ed8;
		}

		.btn-primary:disabled {
			background: #93c5fd;
			cursor: default;
		}

		/* Create status message */
		#create-status {
			margin: 0.6rem 0 0;
			min-height: 1.25rem;
			font-size: 0.875rem;
			color: #2563eb;
		}

		#create-status.error {
			color: #dc2626;
		}

		/* ── "Meine Links" section ── */
		.section-links {
			padding: 1.5rem;
		}

		.section-links .section-heading {
			margin-bottom: 0.75rem;
		}

		#links-status {
			margin: 0 0 0.5rem;
			min-height: 1.2rem;
			font-size: 0.875rem;
			color: #6b7280;
		}

		#links-status.error {
			color: #dc2626;
		}

		/* ── Individual link cards ── */
		#links-list {
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
		}

		.link-row {
			background: #fff;
			border: 1px solid #e5e7eb;
			border-radius: 10px;
			padding: 1rem 1.1rem;
			transition: box-shadow 0.15s;
		}

		.link-row:hover {
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
		}

		.link-head {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			flex-wrap: wrap;
			margin-bottom: 0.4rem;
		}

		.link-head strong {
			font-size: 0.95rem;
			color: #111827;
			margin-right: 0.1rem;
		}

		/* Push action buttons to the right */
		.link-head .btn-sm:first-of-type {
			margin-left: auto;
		}

		.link-short {
			font-size: 0.9rem;
			margin-bottom: 0.25rem;
		}

		.link-short a {
			color: #2563eb;
			text-decoration: none;
			font-weight: 500;
		}

		.link-short a:hover {
			text-decoration: underline;
		}

		.link-meta {
			font-size: 0.8rem;
			color: #9ca3af;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 100%;
			margin-top: 0.15rem;
		}

		/* ── Badges ── */
		.badge {
			display: inline-block;
			padding: 0.15rem 0.6rem;
			border-radius: 999px;
			font-size: 0.72rem;
			font-weight: 600;
			letter-spacing: 0.01em;
			flex-shrink: 0;
		}

		.badge-active   { background: #d1fae5; color: #065f46; }
		.badge-inactive { background: #f3f4f6; color: #6b7280; }
		.badge-expired  { background: #fef3c7; color: #92400e; }

		/* ── Small action buttons ── */
		.btn-sm {
			padding: 0.28rem 0.7rem;
			font-size: 0.78rem;
			font-weight: 500;
			cursor: pointer;
			border-radius: 999px;
			border: 1px solid #e5e7eb;
			background: #fff;
			color: #374151;
			transition: border-color 0.15s, background 0.15s;
			font-family: inherit;
			flex-shrink: 0;
		}

		.btn-sm:hover {
			border-color: #9ca3af;
			background: #f9fafb;
		}

		/* ── Spinner ── */
		#links-spinner {
			display: flex;
			justify-content: center;
			padding: 1rem 0;
		}

		.spinner {
			width: 22px;
			height: 22px;
			border: 3px solid #e5e7eb;
			border-top-color: #2563eb;
			border-radius: 50%;
			animation: spin 0.7s linear infinite;
		}

		@keyframes spin { to { transform: rotate(360deg); } }

		#links-end {
			text-align: center;
			color: #9ca3af;
			font-size: 0.8rem;
			padding: 0.75rem 0 0;
		}

		/* ── Mobile ── */
		@media (max-width: 560px) {
			body {
				padding: 1rem 0.75rem 3rem;
			}

			.section-create,
			.section-links {
				padding: 1.25rem 1rem;
			}

			.field-row {
				flex-direction: column;
				gap: 0;
			}
		}
	</style>
</head>
<body>
<main class="app-page">
	<div class="app-card">
		<!-- Header: brand + user email + logout -->
		<header class="app-header">
			<div class="app-brand-row">
				<div class="brand" data-i18n="brand">aadd.li</div>
				<form id="logout-form" method="post" action="/logout" hidden>
					<button type="submit" class="btn-ghost" data-i18n="app.logout">Abmelden</button>
				</form>
			</div>
			<p id="status" data-i18n="app.links.loading">Lade…</p>
			<hr class="divider" />
		</header>

		<section id="link-section" hidden>
			<!-- Location shortlink (PWA only) -->
			<div id="location-section-app" style="display:none; padding: 1.5rem 1.5rem 0;">
				<button type="button" id="location-btn-app" class="btn-primary" data-i18n="app.location.button">
					Standort als Link speichern
				</button>
			</div>

			<!-- Create form -->
			<div class="section-create">
				<h2 class="section-heading" data-i18n="app.create.title">Neuen Link kürzen</h2>
				<form id="create-form">
					<div class="field">
						<label for="f-url" data-i18n="app.create.url">Ziel-URL *</label>
						<input type="url" id="f-url" name="target_url"
							data-i18n-placeholder="app.create.url.placeholder" placeholder="https://example.com/sehr/langer/pfad" required />
					</div>
					<div class="field-row">
						<div class="field">
							<label for="f-title" data-i18n="app.create.title_field">Titel (optional)</label>
							<input type="text" id="f-title" name="title" data-i18n-placeholder="app.create.title_field.placeholder" placeholder="Mein Link" />
						</div>
						<div class="field">
							<label for="f-alias" data-i18n="app.create.alias">Alias (optional)</label>
							<input type="text" id="f-alias" name="alias" data-i18n-placeholder="app.create.alias.placeholder" placeholder="mein-link"
								pattern="[a-z0-9_-]{3,50}" data-i18n-title="app.create.alias.title" title="3–50 Zeichen: nur Kleinbuchstaben (a–z), Ziffern, Bindestrich (-), Unterstrich (_)" />
						</div>
					</div>
					<div class="field">
						<label for="f-expires" data-i18n="app.create.expires">Ablaufdatum (optional)</label>
						<input type="datetime-local" id="f-expires" name="expires_at" />
					</div>
					<button type="submit" class="btn-primary" data-i18n="app.create.submit">Erstellen</button>
				</form>
				<p id="create-status"></p>
			</div>

			<!-- Links list -->
			<div class="section-links">
				<h2 class="section-heading" data-i18n="app.links.title">Meine Links</h2>
				<p id="links-status"></p>
				<div id="links-list"><em data-i18n="app.links.loading">Lade…</em></div>
				<div id="links-spinner" hidden><div class="spinner"></div></div>
			</div>
		</section>
	</div>
</main>

	<script src="/i18n.js" defer></script>
<script src="/app.js" defer></script>
</body>
</html>
